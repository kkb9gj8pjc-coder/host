<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>План зала</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #22223a;
  --border: #2e2e4a;
  --accent: #e94560;
  --green: #10b981;
  --text: #f0f0f0;
  --muted: #777;
  --radius: 12px;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  background: var(--surface);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  border-bottom: 2px solid var(--border);
  gap: 10px;
}
.header-left { display: flex; flex-direction: column; gap: 1px; }
.header h1 { font-size: 0.95rem; font-weight: 800; }
.header-date { font-size: 0.68rem; color: var(--muted); }

/* Mode badge in header */
.mode-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
}
.mode-badge.edit {
  background: #2a1a3e;
  color: #c084fc;
  border: 1.5px solid #7c3aed44;
}
.mode-badge.work {
  background: #0d2a1e;
  color: var(--green);
  border: 1.5px solid #10b98144;
}
.mode-badge .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.mode-badge.edit .dot { background: #a855f7; }
.mode-badge.work .dot { background: var(--green); animation: pulse 1.8s infinite; }

@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ── EDIT MODE UI ── */
.edit-panel {
  display: none;
  flex-direction: column;
}
.edit-panel.visible { display: flex; }

.waiter-strip {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 12px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  align-items: center;
  scrollbar-width: none;
}
.waiter-strip::-webkit-scrollbar { display: none; }

.w-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 13px;
  border-radius: 20px;
  border: 2px solid transparent;
  font-size: 0.8rem;
  font-weight: 700;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.15s;
  color: #fff;
  flex-shrink: 0;
}
.w-chip.active { border-color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,0.15); }
.w-chip .del-x {
  width: 16px; height: 16px;
  background: rgba(0,0,0,0.35);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem;
  cursor: pointer;
  flex-shrink: 0;
}

.w-chip-ghost {
  padding: 7px 13px;
  border-radius: 20px;
  border: 2px dashed #444;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--muted);
  background: transparent;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.15s;
}
.w-chip-ghost:active { border-color: #aaa; color: #aaa; }

.edit-hint {
  padding: 8px 16px;
  font-size: 0.72rem;
  color: var(--muted);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
}
.edit-hint span { color: #c084fc; font-weight: 600; }

/* Save zones button */
.save-zones-bar {
  padding: 12px 16px;
  background: var(--bg);
}
.save-zones-btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #7c3aed;
  color: #fff;
  font-size: 0.95rem;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.15s;
}
.save-zones-btn:active { background: #6d28d9; }

/* ── WORK MODE UI ── */
.work-panel {
  display: none;
  flex-direction: column;
}
.work-panel.visible { display: flex; }

.work-top {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  align-items: center;
  scrollbar-width: none;
}
.work-top::-webkit-scrollbar { display: none; }

/* Waiter filter chips in work mode */
.wf-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: 20px;
  border: 2px solid transparent;
  font-size: 0.78rem;
  font-weight: 700;
  white-space: nowrap;
  cursor: pointer;
  color: #fff;
  flex-shrink: 0;
  opacity: 0.5;
  transition: all 0.15s;
}
.wf-chip.on { opacity: 1; border-color: #ffffff66; }
.wf-chip .wf-count {
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  padding: 1px 6px;
  font-size: 0.68rem;
}

.edit-zones-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1.5px solid #7c3aed55;
  background: #2a1a3e;
  color: #c084fc;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.15s;
  margin-left: auto;
}
.edit-zones-btn:active { background: #3b1f5e; }

/* ── FLOOR ── */
.floor-scroll {
  overflow-x: auto;
  overflow-y: hidden;
  padding: 14px 16px;
  scrollbar-width: none;
}
.floor-scroll::-webkit-scrollbar { display: none; }

.floor {
  position: relative;
  width: 640px;
  height: 440px;
  background: #12122a;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  flex-shrink: 0;
}

.section-label {
  position: absolute;
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #3a3a5a;
  pointer-events: none;
}

/* TABLE */
.tbl {
  position: absolute;
  width: 46px;
  height: 46px;
  border-radius: 8px;
  border: 2px solid #444;
  background: #1e1e36;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
  user-select: none;
  color: #fff;
  touch-action: manipulation;
}
.tbl:active { transform: scale(0.9); }
.tbl.round { border-radius: 50%; width: 42px; height: 42px; }

.tbl.occupied {
  border-color: var(--accent) !important;
  box-shadow: 0 0 10px rgba(233,69,96,0.45);
}
.tbl.occupied::before {
  content: '';
  position: absolute;
  top: 4px; right: 4px;
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
}

/* dim unassigned tables in work mode */
.tbl.unassigned-work {
  opacity: 0.3;
  cursor: default;
}

/* ── STATS ── */
.stats-strip {
  display: flex;
  gap: 10px;
  padding: 12px 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.stats-strip::-webkit-scrollbar { display: none; }

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  min-width: 110px;
  flex-shrink: 0;
  border-left: 3px solid transparent;
}
.stat-card .sc-name {
  font-size: 0.75rem;
  font-weight: 700;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.stat-card .sc-row {
  font-size: 0.7rem;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 2px;
}
.stat-card .sc-row b { color: var(--text); }
.stat-card .sc-row .red { color: var(--accent); font-weight: 700; }

/* ── MODALS ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.overlay.open { display: flex; }

.sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px 36px;
  width: 100%;
  max-width: 480px;
  animation: slideUp 0.22s ease;
}
@keyframes slideUp {
  from { transform: translateY(60px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.sheet-handle {
  width: 40px; height: 4px;
  background: #444;
  border-radius: 2px;
  margin: 0 auto 18px;
}
.sheet h3 { font-size: 1rem; font-weight: 800; margin-bottom: 8px; }
.sheet p { font-size: 0.85rem; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }
.sheet input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 1rem;
  margin-bottom: 14px;
  outline: none;
}
.sheet input:focus { border-color: #7c3aed; }

.color-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
.color-chip {
  width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
  border: 3px solid transparent; transition: border-color 0.1s, transform 0.1s;
}
.color-chip.sel { border-color: #fff; transform: scale(1.15); }

.btn-row { display: flex; gap: 10px; }
.btn-row button {
  flex: 1; padding: 13px; border-radius: 10px; border: none;
  font-size: 0.95rem; font-weight: 700; cursor: pointer;
}
.btn-cancel { background: var(--surface2); color: var(--muted); }
.btn-save   { background: #7c3aed; color: #fff; }
.btn-del    { background: #b91c1c; color: #fff; }

/* ── TABLE POPUP ── */
.tbl-popup {
  display: none;
  position: fixed;
  background: #0f0f23;
  border: 1px solid #333;
  border-radius: 12px;
  padding: 12px 14px;
  z-index: 150;
  min-width: 150px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.7);
  pointer-events: none;
  font-size: 0.78rem;
}
.tbl-popup.show { display: block; }
.tbl-popup .pt { font-weight: 800; margin-bottom: 5px; font-size: 0.85rem; }
.tbl-popup .pr { color: var(--muted); display: flex; justify-content: space-between; gap: 12px; margin-bottom: 2px; }
.tbl-popup .pr b { color: var(--text); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <h1>🍽 План зала</h1>
    <span class="header-date" id="date-label"></span>
  </div>
  <div class="mode-badge edit" id="mode-badge">
    <div class="dot"></div>
    <span id="mode-badge-text">Редактирование зон</span>
  </div>
</div>

<!-- EDIT MODE PANEL -->
<div class="edit-panel visible" id="edit-panel">
  <div class="waiter-strip" id="waiter-strip"></div>
  <div class="edit-hint" id="edit-hint">Выбери официанта и назначь столы</div>

  <div class="floor-scroll">
    <div class="floor" id="floor-edit">
      <div class="section-label" style="left:16px;top:14px;">Самовывоз</div>
      <div class="section-label" style="left:16px;top:122px;">Бар</div>
      <div class="section-label" style="left:450px;top:14px;">Хост</div>
    </div>
  </div>

  <div class="save-zones-bar">
    <button class="save-zones-btn" onclick="saveZones()">
      ✓ Сохранить зоны и начать смену
    </button>
  </div>
</div>

<!-- WORK MODE PANEL -->
<div class="work-panel" id="work-panel">
  <div class="work-top" id="work-top"></div>

  <div class="floor-scroll">
    <div class="floor" id="floor-work">
      <div class="section-label" style="left:16px;top:14px;">Самовывоз</div>
      <div class="section-label" style="left:16px;top:122px;">Бар</div>
      <div class="section-label" style="left:450px;top:14px;">Хост</div>
    </div>
  </div>

  <div class="stats-strip" id="stats-strip"></div>
</div>

<!-- Table popup -->
<div class="tbl-popup" id="tbl-popup"></div>

<!-- Add waiter sheet -->
<div class="overlay" id="modal-add">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>Новый официант</h3>
    <input type="text" id="waiter-name-input" placeholder="Имя" maxlength="16" autocomplete="off">
    <div class="color-row" id="color-picker"></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('modal-add')">Отмена</button>
      <button class="btn-save"   onclick="saveWaiter()">Добавить</button>
    </div>
  </div>
</div>

<!-- Delete waiter sheet -->
<div class="overlay" id="modal-del">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>Удалить официанта?</h3>
    <p id="del-text"></p>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('modal-del')">Отмена</button>
      <button class="btn-del"    onclick="confirmDelete()">Удалить</button>
    </div>
  </div>
</div>

<!-- Edit zones confirm sheet (from work mode) -->
<div class="overlay" id="modal-edit-confirm">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>Редактировать зоны?</h3>
    <p>Статусы гостей сохранятся. Ты вернёшься в режим настройки зон.</p>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('modal-edit-confirm')">Отмена</button>
      <button class="btn-save"   onclick="goEditMode()">Перейти</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#f97316','#84cc16','#ef4444','#6366f1'];

// ── STATE ──
// appMode: 'edit' | 'work'
let appMode = 'edit';
let selectedWaiter = null;
let pendingColor = COLORS[0];
let pendingDeleteId = null;
let nextWaiterId = 4;
// In work mode, which waiter chip is highlighted (null = all)
let filterWaiter = null;

let waiters = [
  { id:1, name:'Полина', color:'#3b82f6' },
  { id:2, name:'Арина',  color:'#10b981' },
  { id:3, name:'Клоша',  color:'#f59e0b' },
];

const TABLE_DEFS = [
  {id:41,x:28, y:42, r:false},{id:42,x:84, y:42, r:false},{id:43,x:140,y:42, r:false},
  {id:44,x:196,y:42, r:false},{id:45,x:252,y:42, r:false},
  {id:46,x:28, y:148,r:false},{id:47,x:84, y:148,r:false},{id:48,x:140,y:148,r:false},
  {id:49,x:196,y:148,r:false},{id:50,x:252,y:148,r:false},
  {id:1, x:440,y:26, r:false},
  {id:2, x:508,y:42, r:true },{id:3, x:568,y:28, r:true },
  {id:4, x:568,y:98, r:true },{id:5, x:508,y:132,r:true },
  {id:6, x:508,y:218,r:true },
  {id:7, x:412,y:218,r:false},{id:8, x:354,y:218,r:false},
  {id:10,x:276,y:218,r:false},{id:11,x:218,y:218,r:false},
  {id:13,x:140,y:218,r:false},{id:14,x:82, y:218,r:false},{id:15,x:24, y:218,r:false},
  {id:16,x:24, y:276,r:true },
  {id:17,x:64, y:276,r:false},{id:18,x:120,y:276,r:false},{id:19,x:176,y:276,r:false},
  {id:20,x:232,y:276,r:false},{id:21,x:288,y:276,r:false},{id:22,x:344,y:276,r:false},
  {id:23,x:454,y:276,r:false},
  {id:24,x:536,y:244,r:true },{id:25,x:536,y:304,r:true },
  {id:26,x:518,y:356,r:false},{id:28,x:440,y:356,r:false},{id:30,x:362,y:356,r:false},
  {id:31,x:304,y:356,r:false},{id:32,x:246,y:356,r:false},{id:33,x:188,y:356,r:false},
  {id:34,x:130,y:356,r:false},{id:35,x:72, y:356,r:false},
];

let tables = {};
TABLE_DEFS.forEach(d => { tables[d.id] = { id:d.id, waiter:null, occupied:false }; });

// ── RENDER ──
function render() {
  if (appMode === 'edit') {
    renderEditMode();
  } else {
    renderWorkMode();
  }
}

function renderEditMode() {
  document.getElementById('edit-panel').classList.add('visible');
  document.getElementById('work-panel').classList.remove('visible');

  const badge = document.getElementById('mode-badge');
  badge.className = 'mode-badge edit';
  document.getElementById('mode-badge-text').textContent = 'Настройка зон';

  renderWaiterStrip();
  renderFloor('floor-edit', 'edit');
  updateEditHint();
}

function renderWorkMode() {
  document.getElementById('edit-panel').classList.remove('visible');
  document.getElementById('work-panel').classList.add('visible');

  const badge = document.getElementById('mode-badge');
  badge.className = 'mode-badge work';
  document.getElementById('mode-badge-text').textContent = 'Смена идёт';

  renderWorkTop();
  renderFloor('floor-work', 'work');
  renderStats();
}

// ── EDIT: waiter strip ──
function renderWaiterStrip() {
  const strip = document.getElementById('waiter-strip');
  strip.innerHTML = '';

  waiters.forEach(w => {
    const chip = document.createElement('div');
    chip.className = 'w-chip' + (selectedWaiter === w.id ? ' active' : '');
    chip.style.background = w.color;
    chip.innerHTML = `${w.name}<span class="del-x">✕</span>`;
    chip.addEventListener('click', e => {
      if (e.target.classList.contains('del-x')) openDelete(w.id);
      else selectWaiter(w.id);
    });
    strip.appendChild(chip);
  });

  const clearBtn = document.createElement('button');
  clearBtn.className = 'w-chip-ghost';
  clearBtn.textContent = '✕ Снять';
  clearBtn.onclick = () => selectWaiter('clear');
  strip.appendChild(clearBtn);

  const addBtn = document.createElement('button');
  addBtn.className = 'w-chip-ghost';
  addBtn.textContent = '+ Добавить';
  addBtn.onclick = openAddWaiter;
  strip.appendChild(addBtn);
}

function updateEditHint() {
  const h = document.getElementById('edit-hint');
  if (!selectedWaiter) {
    h.innerHTML = 'Выбери официанта и назначь столы';
  } else if (selectedWaiter === 'clear') {
    h.innerHTML = '<span>Снять зону</span> — нажми на стол чтобы убрать назначение';
  } else {
    const w = waiters.find(x => x.id === selectedWaiter);
    h.innerHTML = `<span style="color:${w.color}">${w.name}</span> — нажимай на столы`;
  }
}

// ── WORK: top filter bar ──
function renderWorkTop() {
  const top = document.getElementById('work-top');
  top.innerHTML = '';

  waiters.forEach(w => {
    const myT = Object.values(tables).filter(t => t.waiter === w.id);
    const occ = myT.filter(t => t.occupied).length;
    const chip = document.createElement('div');
    const isOn = filterWaiter === null || filterWaiter === w.id;
    chip.className = 'wf-chip' + (isOn ? ' on' : '');
    chip.style.background = w.color;
    chip.innerHTML = `${w.name}<span class="wf-count">${occ}/${myT.length}</span>`;
    chip.onclick = () => {
      filterWaiter = (filterWaiter === w.id) ? null : w.id;
      renderWorkMode();
    };
    top.appendChild(chip);
  });

  const editBtn = document.createElement('button');
  editBtn.className = 'edit-zones-btn';
  editBtn.textContent = '✏️ Зоны';
  editBtn.onclick = () => document.getElementById('modal-edit-confirm').classList.add('open');
  top.appendChild(editBtn);
}

// ── FLOOR ──
function renderFloor(floorId, mode) {
  const floor = document.getElementById(floorId);
  floor.querySelectorAll('.tbl').forEach(e => e.remove());

  TABLE_DEFS.forEach(def => {
    const t = tables[def.id];
    const w = t.waiter ? waiters.find(x => x.id === t.waiter) : null;

    const el = document.createElement('div');
    let cls = 'tbl' + (def.r ? ' round' : '') + (t.occupied ? ' occupied' : '');

    if (mode === 'work' && !t.waiter) cls += ' unassigned-work';
    if (mode === 'work' && filterWaiter && t.waiter !== filterWaiter) {
      el.style.opacity = '0.2';
    }

    el.className = cls;
    el.style.left = def.x + 'px';
    el.style.top  = def.y + 'px';

    if (w) {
      el.style.background = w.color + '44';
      el.style.borderColor = t.occupied ? '' : w.color;
    }

    el.innerHTML = `<span>${def.id}</span>`;

    if (mode === 'edit') {
      el.addEventListener('click', () => editTableClick(def.id, el));
    } else {
      if (t.waiter) el.addEventListener('click', () => workTableClick(def.id, el));
      else el.style.cursor = 'default';
    }

    floor.appendChild(el);
  });
}

// ── STATS ──
function renderStats() {
  const sb = document.getElementById('stats-strip');
  sb.innerHTML = '';
  waiters.forEach(w => {
    const myT = Object.values(tables).filter(t => t.waiter === w.id);
    const occ = myT.filter(t => t.occupied).length;
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.style.borderLeftColor = w.color;
    card.innerHTML = `
      <div class="sc-name"><span class="sc-dot" style="background:${w.color}"></span>${w.name}</div>
      <div class="sc-row">Всего: <b>${myT.length}</b></div>
      <div class="sc-row">Занято: <b class="red">${occ}</b> / ${myT.length}</div>
    `;
    sb.appendChild(card);
  });
}

// ── INTERACTIONS ──
function selectWaiter(id) {
  selectedWaiter = id;
  renderWaiterStrip();
  updateEditHint();
}

function editTableClick(id, el) {
  if (!selectedWaiter) return;
  if (selectedWaiter === 'clear') {
    tables[id].waiter = null;
  } else {
    tables[id].waiter = selectedWaiter;
  }
  renderFloor('floor-edit', 'edit');
}

let popupTimer;
function workTableClick(id, el) {
  tables[id].occupied = !tables[id].occupied;
  renderWorkMode();
  showPopup(id, el);
}

function showPopup(id, el) {
  const t = tables[id];
  const w = t.waiter ? waiters.find(x => x.id === t.waiter) : null;
  const pop = document.getElementById('tbl-popup');
  const rect = el.getBoundingClientRect();
  pop.innerHTML = `
    <div class="pt">Стол ${id}</div>
    <div class="pr">Официант: <b>${w ? w.name : '—'}</b></div>
    <div class="pr">Статус: <b style="color:${t.occupied?'#e94560':'#10b981'}">${t.occupied ? 'Занят 🔴' : 'Свободен 🟢'}</b></div>
  `;
  pop.style.left = Math.min(rect.left, window.innerWidth - 175) + 'px';
  pop.style.top  = Math.max(8, rect.top - 95 + window.scrollY) + 'px';
  pop.classList.add('show');
  clearTimeout(popupTimer);
  popupTimer = setTimeout(() => pop.classList.remove('show'), 1500);
}

// ── MODE SWITCHES ──
function saveZones() {
  appMode = 'work';
  filterWaiter = null;
  render();
}

function goEditMode() {
  closeModal('modal-edit-confirm');
  appMode = 'edit';
  selectedWaiter = null;
  render();
}

// ── MODALS ──
let pendingColor2 = COLORS[0];

function openAddWaiter() {
  const picker = document.getElementById('color-picker');
  picker.innerHTML = '';
  COLORS.forEach((c, i) => {
    const chip = document.createElement('div');
    chip.className = 'color-chip' + (i === 0 ? ' sel' : '');
    chip.style.background = c;
    chip.onclick = () => {
      pendingColor2 = c;
      picker.querySelectorAll('.color-chip').forEach(x => x.classList.remove('sel'));
      chip.classList.add('sel');
    };
    picker.appendChild(chip);
  });
  pendingColor2 = COLORS[0];
  document.getElementById('waiter-name-input').value = '';
  document.getElementById('modal-add').classList.add('open');
  setTimeout(() => document.getElementById('waiter-name-input').focus(), 300);
}

function saveWaiter() {
  const name = document.getElementById('waiter-name-input').value.trim();
  if (!name) return;
  waiters.push({ id: nextWaiterId++, name, color: pendingColor2 });
  closeModal('modal-add');
  renderWaiterStrip();
}

function openDelete(id) {
  pendingDeleteId = id;
  const w = waiters.find(x => x.id === id);
  document.getElementById('del-text').textContent =
    `«${w.name}» будет удалён. Все его столы станут без зоны.`;
  document.getElementById('modal-del').classList.add('open');
}

function confirmDelete() {
  if (!pendingDeleteId) return;
  Object.values(tables).forEach(t => { if (t.waiter === pendingDeleteId) t.waiter = null; });
  waiters = waiters.filter(w => w.id !== pendingDeleteId);
  if (selectedWaiter === pendingDeleteId) selectedWaiter = null;
  pendingDeleteId = null;
  closeModal('modal-del');
  render();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.overlay').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('open'); });
});

// ── DATE ──
const d = new Date();
document.getElementById('date-label').textContent =
  d.toLocaleDateString('ru-RU', { weekday:'short', day:'numeric', month:'short' });

// ── INIT ──
render();
</script>
